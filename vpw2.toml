# N64Recomp config for Virtual Pro Wrestling 2 - Oudou Keishou (Japan, NA2J).
# Adapted from No Mercy's nomercy.toml (which came from WM2000's -> Revenge's ->
# World Tour's). VPW2 (Jan 2000) is VPW64's sequel and sits between WM2000
# (Oct 1999) and No Mercy (Nov 2000) on the same AKI engine — expect that era's
# architecture: entrypoint 0x80000400, fixed segment rom 0x1000 <-> vram 0x80000400,
# multiple overlays across shared vram swap slots (9-word descriptor table in
# fixed-segment data). Symbol-TOML mode.

[input]
entrypoint = 0x80000400
rom_file_path = "vpw2.z64"
bss_section_suffix = "_bss"
symbols_file_path = "syms/dump.toml"
output_func_path = "RecompiledFuncs"
trace_mode = false

[patches]
# Functions containing cop0/cache/eret/tlb opcodes are stubbed (syms/
# stub_candidates.txt, regenerated by tools/gen_stubs.py which rewrites this block —
# do NOT put comments inside it). Classify each against No Mercy's verified 17-stub
# table (its bringup notes; every one reverse-fingerprinted onto WM2000's verified
# set). The standing lesson: NEVER stub osGetCount — it freezes the game clock.
stubs = [
    "func_80030250",
    "func_80030300",
    "func_80030380",
    "func_80030400",
    "func_80033820",
    "func_80037560",
    "func_80037AA4",
    "func_80037ABC",
    "func_80037BDC",
    "func_80037D44",
    "func_80038460",
    "func_80038480",
    "func_80038490",
    "func_800384B0",
    "func_800384C0",
    "func_80038750",
    "func_800387B0",
]
ignored = [
    # not in N64Recomp's built-in auto-ignore set (unlike osCartRomInit), but
    # librecomp exports osDriveRomInit_recomp — route calls to the shim
    # (recomp_api.cpp bridge); without this the recompiled copy duplicates the
    # bridge symbol at link time (No Mercy/WM2000's exact arrangement).
    "osDriveRomInit",
]

# Idle-thread cooperative-yield fix — EVERY sister needed it (WT devlog; No Mercy
# bringup session 2: main thread parks in a busy spin after dropping priority to 0,
# starving message delivery under the cooperative scheduler; signature = ext backlog
# grows, del/s=0, vis/s=0). Find the spin (`jal <tick>; j <loop>` right after the
# osSetThreadPri(0) in the thread-1 main), then rewrite the backward j into a
# self-branch (`b .` = 0x1000FFFF) so N64Recomp emits pause_self().
# VPW2 (2026-07-17): thread-1 main is func_800004D0 (SAME name/vram as NM+WM2K);
# the spin is `jal 0x80032050; nop; j 0x800005A4` — the only unconditional
# jal+backward-j loop in the fixed segment (idle_scan sweep). boot2 confirmed
# the signature verbatim: ext backlog +60/s, del/s=0, vis/s=0.
[[patches.instruction]]
func = "func_800004D0"
vram = 0x800005AC
value = 0x1000FFFF
