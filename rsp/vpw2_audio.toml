# RSPRecomp config for VPW2's AUDIO microcode — CONFIRMED IN RECON 2026-07-17
# (tools/vpw2_recon.py): Revenge, WM2000, No Mercy, and now VPW2 all share ONE
# byte-identical newer-AKI audio ucode revision (0xC54 text; VPW2 at rom 0x3A2F0,
# No Mercy 0x41050, WM2000 0x39510, Revenge 0x2C910 — the rom offset MOVES per
# game, the text is identical). The full-length 0xC54 byte-search hit at exactly
# one offset; the audio dispatch table matched bit-identically at rom 0x4A730.
# text_size/text_address/branch targets below therefore transfer VERBATIM,
# including the 12-bit-PC jump-table gotcha (entry 14 stored 0x02B0 =
# recompiler 0x12B0; see Revenge's rsp/README.md).
# text_address 0x04001080 = where rspboot places task ucode in IMEM.
# Run from repo root:  .\RSPRecomp.exe rsp\vpw2_audio.toml  (paths relative to rsp/).
text_offset = 0x3A2F0
text_size = 0xC54
text_address = 0x04001080
rom_file_path = "../vpw2.z64"
output_file_path = "vpw2_audio.cpp"
output_function_name = "vpw2_audio_ucode"

extra_indirect_branch_targets = [
	0x10EC, 0x139C, 0x119C, 0x1A64, 0x11C8, 0x17EC, 0x1208,
	0x127C, 0x1348, 0x1248, 0x1C84, 0x12D4, 0x12B0, 0x1384
]
